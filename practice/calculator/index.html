<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: auto;
      }
      .box {
        height: 500px;
        width: 270px;
        background-color: black;
      }
      .showbox {
        height: 40%;
      }
      .back img {
        height: 15px;
      }
      .entries {
        margin-left: 7px;
      }
      .btn {
        height: 50px;
        width: 50px;
        margin: 5px 5px;
        border-radius: 50px;
        border: none;
        font-size: 20px;
        font-weight: 500;
        background-color: rgba(255, 255, 255, 0.136);
        color: white;
      }
      .line5btns {
        margin-bottom: 10px;
      }
      .operator {
        background-color: rgb(255, 162, 0);
      }
      .ln1btn {
        background-color: rgba(255, 255, 255, 0.504);
      }
      .showbox {
        color: white;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="showbox"></div>
        <div class="entries">
          <div class="line1btns">
            <button class="allclear ln1btn click btn">AC</button>
            <button class="percent ln1btn click btn">%</button>
            <button class="back ln1btn click btn">
              <img src="backspace-svgrepo-com.svg" alt="" />
            </button>

            <button class="divide btn click operator">/</button>
          </div>
          <div class="line2btns">
            <button class="7btn click btn">7</button>
            <button class="8btn click btn">8</button>
            <button class="9btn click btn">9</button>
            <button class="multiply click btn operator">X</button>
          </div>
          <div class="line3btns">
            <button class="4btn click btn">4</button>
            <button class="5btn click btn">5</button>
            <button class="6btn click btn">6</button>
            <button class="subbtn btn click operator">-</button>
          </div>
          <div class="line4btns">
            <button class="1btn click btn">1</button>
            <button class="2btn click btn">2</button>
            <button class="3btn click btn">3</button>
            <button class="plus click btn operator">+</button>
          </div>
          <div class="line5btns">
            <button class="00btn click btn">00</button>
            <button class="0btn click btn">0</button>
            <button class="dotbtn click btn">.</button>
            <button class="equalto click btn operator">=</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      let button = document.querySelectorAll(".btn");
      let plus = document.querySelectorAll(".plus");
      let subtract = document.querySelectorAll(".subbtn");
      let multiply = document.querySelectorAll(".multiply");
      let divide = document.querySelectorAll(".divide");
      let arr=[];
      let alclr=document.querySelector(".allclear");
      let equal=document.querySelector(".equalto");

      let txtshwn=document.querySelector(".showbox")
      button.forEach((btn) => {
        btn.addEventListener("click", () => {
          let value=btn.textContent;
          if(value==="+")value="+";
          if(value==="-")value="-";
          if(value==="X")value="*";
          if(value==="/")value="/";
          txtshwn.innerHTML=txtshwn.innerHTML+btn.textContent;
          arr.push(value);

          console.log(arr);
        });
        
      });
      alclr.addEventListener("click",()=>{
        txtshwn.innerHTML="";
        arr=[];
      });
      equal.addEventListener("click",()=>{
        try{
          let expression = arr.join("");
          let result=eval(expression);
          txtshwn.innerHTML=result;
          arr=[result];

        }
        catch {
    txtshwn.innerHTML = "Error";
  }
      })
    </script>
  </body>
</html>
