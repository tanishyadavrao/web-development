<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>challenge</title>
    
    <style>
        body{
            background-color: grey;
        }
      .box {
        border: 2px solid #2eae9f;
        height: 90vh;
        width: 60vw;
        
        background-color: white;
        border-radius: 7px;
      } 
      .box1 {
        width: 80%;
        left: 10%;
        height: 40%;
        padding: 20px;
        
        
      }
      .box1 img{
        border-radius: 5px;
      }
      .buttons{
        border: 2px solid bisque;
        margin: 5px;
        border-radius: 4px;
        padding:2px;
        position: relative;
        left:5%
        
      }
      h1,p{
        position:relative;
        left: 5%;
      }
      .button{
        text-align: center;
        
      }
      .button button{
        padding: 0 13px;
        border-radius: 4px;
        background-color: rgb(133, 172, 183);
        color: rgb(0, 213, 255);
        cursor: pointer;


      }
      .button button:hover{
        background-color: greenyellow;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="box1">
        <img src="../image/photo.jpg" alt="" width="100%" height="100%" />
      </div>
      <span class="buttons">
        nature
      </span>
      <span class="buttons">lake</span>
      <h1>Lorem ipsum</h1>
      <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Unde sint blanditiis quisquam!</p>
      <div class="button">
        <button>submit</button>

      </div>
    </div>
  </body>
</html>
