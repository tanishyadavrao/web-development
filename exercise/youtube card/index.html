<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>youtube card</title>
    <style>
      * {
        font-family: sans-serif;
      }
      body {
        background-color: sandybrown;
      }
      .container {
        height: 100vh;
        width: 100vw;
      }
      .box {
        background-color: black;
        margin-top: 230px;
        margin-left: 50px;
        width: 1100px;
        border-radius: 5px;
        display: flex;
      }
      .photo {
        border-radius: 5px;
        position: relative;
      }
      .content2 {
        color: white;
        display: flex;
        margin-top: 10px;
        margin-left: 20px;
        font-weight: 800;
      }
      .content3 {
        color: white;
        display: flex;
        margin-top: 10px;
        margin-left: 20px;
        width: 400px;

      }
      .content4{
        margin-left: 5px;
      }
      .vdoDrtn{
        color: white;
        position: absolute;
        z-index: 10px;
        bottom: 0;
        right: 0;
        background-color: grey;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="photo">
          <img
            class="photo"
            src="https://i.ytimg.com/vi/CO_DAXswOrc/hqdefault.jpg?sqp=-oaymwEmCKgBEF5IWvKriqkDGQgBFQAAiEIYAdgBAeIBCggYEAIYBjgBQAE=&rs=AOn4CLB6ouPFLR2i6ngfU4nkqcHSdWgLiQ"
          />
          <div class="vdoDrtn">30</div>
        </div>
        <div class="content1">
          <div class="content2">Tittle</div>
          <div class="content3">
            <div class="creator">harry</div>
            <div class="dot">.</div>
            <div class="views content4">views</div>
            <div class="dot">.</div>

            <div class="time content4">time</div>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      console.log("hello");

      let title = prompt("enter the tittle of the card");
      let cname = prompt("enter the channel name");
      let views = prompt("enter the number of views on the vedio");
      let monthsold = prompt("how months old is the vedio");
      let duration=prompt("enter the duration of the vedio");

      
      

      function createcard(title, cname, views, monthsold,duration) {
        document.querySelector(".content2").innerHTML = title;
        document.querySelector(".creator").innerHTML = cname;
        document.querySelector(".views").innerHTML = views;
        document.querySelector(".time").innerHTML = monthsold;
        document.querySelector(".vdoDrtn").innerHTML = duration;
      }
      createcard(title, cname, views, monthsold,duration);
    </script>
    
  </body>
</html>
