<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" class="css" />
  </head>
  <body>
    <h1>Tic-Tac-Toe</h1>

    <div class="container">
      <div class="firstrow">
        <button class="boxes box1" id="box0"></button>

        <button class="boxes box2" id="box1"></button>

        <button class="boxes box3" id="box2"></button>
      </div>
      <div class="secondrow">
        <button class="boxes box1" id="box3"></button>

        <button class="boxes box2" id="box4"></button>

        <button class="boxes box3" id="box5"></button>
      </div>
      <div class="thirdrow">
        <button class="boxes box1" id="box6"></button>

        <button class="boxes box2" id="box7"></button>

        <button class="boxes box3" id="box8"></button>
      </div>
      <div class="buttons">
        <button class="btn" id="resetBtn">Reset Game</button>
        <button class="btn" id="cgMode">Change Mode</button>
      </div>
      <div class="msg hide">
        <div class="winnertxt"></div>
        <button class="btn" id="newgmbtn">New game</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
