<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact_form</title>
    
    <style>
        fieldset{
    background-color: rgb(20, 195, 195);
    text-align: center;
    color: rgb(15, 84, 144);
}
body{
    padding :12px;
    border: 1px;
    margin: 102px;
}
p{
    text-align: left;
}
input[type="text"],textarea,
input[type="email"]{
    text-align: left;
    width: 100%;
    padding: 12px;
}
input[type="submit"]{
    width: 100%;
    height: 44px;
    background-color: rgb(23, 184, 122);
    border:none;
    border-radius: 6px;
    cursor: pointer;
    
}

    
    

    </style>
</head>
<body>
    <form>
        <fieldset>
            <h1>contact form</h1>
            <h3>please enter your contact details</h3>
        </fieldset>
        <p>name <input type="text" required placeholder="enter your full name"></p>
        <p>email <input type="email" placeholder="enter your email id"></p>
        <p>messege <textarea name="enter your message" id="text area" placeholder="any suggestions"></textarea></p>
        <input type="submit" value="send">

    </form>

    
</body>
</html>
