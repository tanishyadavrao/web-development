<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payment form</title>
    
    <style>
        body{
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    padding: 17px;
    margin: 2px;
    border: 1px;
    
}
.container{
    background-color: #f2f2f2;
    padding: 5px 10px 5px 10px;
    border-radius: 8px;
}
h1{
    text-align: center;
}
input[type="text"],
input[type="password"],
input[type="email"],
input[type="number"],
select,textarea{
    width: 100%;
    height: 100%;
    padding: 2px;
}
fieldset{
    color: brown;
}
input[type="submit"]{
    text-align: center;
    background-color: rgb(33, 159, 21);
    border:none;
    padding: 12px 20px;
    color: #f2f2f2;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
}
    </style>
</head>
<body>
    <div class="container">
    <form >
        <h1>payments form</h1>
        <fieldset>
        <legend>contact information</legend>
        <p>Name<sup>*</sup>: <input type="text" name ="name" required placeholder="eg. tanish"> </p>
            <legend>Gender<sup>*</sup></legend>
            <p>male <input type="radio" name="gender" id="male" required>female <input type="radio" name="gender" id="female" required></p>
            <p> address <textarea name="address" id="address" cols="80" rows="10" placeholder="haryana"></textarea></p>
            <p>Email: <sup>*</sup><input type="email" name="email" id="email" required placeholder="abc@gmail.com"></p>
            <p>pincode: <input type="number" name="pincode" id="pincode" placeholder="123456"></p>
        </fieldset>
        <hr>
        <fieldset>
            <legend>payment details</legend>
            <p>card type:
                <select name="card_type" id="card_type">
                    <option value ="">--select a card type--</option>
                    <option value ="visa">visa</option>
                    <option value ="rupay">rupay</option>
                    <option value ="mastercard">mastercard</option>
                </select>
            </p>
            <p>card number: <input type="number" name="card_number" id="card_number"></p>
            <p>card expiration date <input type="date" name="exp_date" id="exp_date">
                
            </p>
            <p>cvv <input type="password" name="cvv" id="cvv"></p>
        </fieldset> 
        <input type="submit" value="pay now">
    </form>
    
    </div>
</body>
</html>
